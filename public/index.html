<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nearby Food Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Nearby Restaurants</h1>
    <p>Search for top-rated restaurants with dish photos and ratings above 4.5.</p>
  </header>

  <main>
    <section class="controls">
      <div>
        <label for="search">Search restaurants:</label>
        <input id="search" type="search" placeholder="Type restaurant name or cuisine" />
      </div>
      <div>
        <button id="findBtn">Find nearby restaurants</button>
      </div>
      <div class="status" id="status">Allow location to view nearby matches.</div>
    </section>

    <section class="categories">
      <h3>Popular Categories</h3>
      <div class="category-buttons">
        <button class="category-btn" data-category="italian">Italian</button>
        <button class="category-btn" data-category="chinese">Chinese</button>
        <button class="category-btn" data-category="mexican">Mexican</button>
        <button class="category-btn" data-category="japanese">Japanese</button>
        <button class="category-btn" data-category="american">American</button>
        <button class="category-btn" data-category="thai">Thai</button>
        <button class="category-btn" data-category="indian">Indian</button>
        <button class="category-btn" data-category="french">French</button>
      </div>
    </section>

    <section class="restaurant-list" id="restaurantList"></section>
  </main>

  <footer>
    <small>Restaurant ratings are filtered to 4.5+ and show curated dish photos.</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
